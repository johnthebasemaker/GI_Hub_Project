# ============================================================================
# gihub.ssl.conf — PRODUCTION nginx config with Let's Encrypt TLS
# Domain: giinventory.com (+ www). Swap this in for gihub.conf once the server
# is live and the cert has been issued (see the bootstrap note at the bottom).
#
# Still the same routing as the HTTP config — only nginx is internet-facing;
# streamlit/fastapi/ollama stay internal on gi-net with no host ports.
# ============================================================================

upstream streamlit_upstream { server streamlit:8501; }
upstream fastapi_upstream   { server fastapi:8000; }

# ---- Port 80: ACME challenge + force HTTPS ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name giinventory.com www.giinventory.com;

    # Let's Encrypt HTTP-01 challenge — served from the shared certbot webroot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Port 443: the application ---------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name giinventory.com www.giinventory.com;

    # Certs issued by certbot into the shared /etc/letsencrypt volume.
    ssl_certificate     /etc/letsencrypt/live/giinventory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giinventory.com/privkey.pem;

    # Mozilla "intermediate" TLS profile.
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # HSTS — only enable once you're confident HTTPS is stable (it's sticky).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 50m;          # photo / MTC / attachment uploads

    # ---- ACME renewal challenge (also answered on 443 just in case) ----
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---- FastAPI sidecar: RAG/manual assistant + Meta WhatsApp webhook ----
    location /api/ {
        proxy_pass         http://fastapi_upstream/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;       # LLM streaming responses
    }

    # ---- Material photos served straight off the gi-data volume (later) ----
    # location /photos/ {
    #     alias /srv/data/material_photos/;
    #     expires 7d;
    #     access_log off;
    # }

    # ---- Streamlit ERP app (root). WebSocket upgrade required. ----
    location / {
        proxy_pass         http://streamlit_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;     # keep the Streamlit WebSocket alive
    }
}

# ============================================================================
# BOOTSTRAP (chicken-and-egg: the :443 block won't load until the cert exists)
# ----------------------------------------------------------------------------
# In docker-compose.yml, the nginx service needs two extra mounts + a certbot
# companion (added in the live TLS step):
#
#   nginx:
#     volumes:
#       - ./docker/nginx/gihub.ssl.conf:/etc/nginx/conf.d/default.conf:ro
#       - certbot-etc:/etc/letsencrypt
#       - certbot-www:/var/www/certbot
#     ports: ["80:80", "443:443"]
#
#   certbot:
#     image: certbot/certbot
#     volumes:
#       - certbot-etc:/etc/letsencrypt
#       - certbot-www:/var/www/certbot
#     # renew twice a day; nginx reloads on its own schedule
#     entrypoint: sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done'
#
# FIRST-ISSUE order (run once after DNS A-record → server IP is live):
#   1. Start with the plain HTTP gihub.conf so nginx comes up on :80.
#   2. Issue the cert:
#        docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
#          -d giinventory.com -d www.giinventory.com \
#          --email you@giinventory.com --agree-tos --no-eff-email
#   3. Swap nginx to this gihub.ssl.conf (+ the 443 port + cert volumes) and
#        docker compose up -d nginx
#   4. Update the Meta webhook callback URL to:
#        https://giinventory.com/api/whatsapp/webhook
# ============================================================================

# ============================================================================
# gihub.ssl.conf — PRODUCTION nginx config with Let's Encrypt TLS
# Domain: giinventory.com (+ www). Swap this in for gihub.conf once the server
# is live and the cert has been issued (see the bootstrap note at the bottom).
#
# Still the same routing as the HTTP config — only nginx is internet-facing;
# streamlit/fastapi/ollama stay internal on gi-net with no host ports.
# ============================================================================

upstream streamlit_upstream { server streamlit:8501; }
upstream fastapi_upstream   { server fastapi:8000; }

# ---- Port 80: ACME challenge + force HTTPS ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name giinventory.com www.giinventory.com;

    # Let's Encrypt HTTP-01 challenge — served from the shared certbot webroot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Port 443: the application ---------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name giinventory.com www.giinventory.com;

    # Certs issued by certbot into the shared /etc/letsencrypt volume.
    ssl_certificate     /etc/letsencrypt/live/giinventory.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giinventory.com/privkey.pem;

    # Mozilla "intermediate" TLS profile.
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # HSTS — only enable once you're confident HTTPS is stable (it's sticky).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 50m;          # photo / MTC / attachment uploads

    # ---- ACME renewal challenge (also answered on 443 just in case) ----
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---- FastAPI sidecar: RAG/manual assistant + Meta WhatsApp webhook ----
    location /api/ {
        proxy_pass         http://fastapi_upstream/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;       # LLM streaming responses
    }

    # ---- Material photos served straight off the gi-data volume (later) ----
    # location /photos/ {
    #     alias /srv/data/material_photos/;
    #     expires 7d;
    #     access_log off;
    # }

    # ---- Streamlit ERP app (root). WebSocket upgrade required. ----
    location / {
        proxy_pass         http://streamlit_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;     # keep the Streamlit WebSocket alive
    }
}

# ============================================================================
# BOOTSTRAP — now fully wired in docker-compose.yml (nginx + certbot services,
# certbot-etc / certbot-www volumes, :80+:443, and a 6h nginx reload loop).
#
# The chicken-and-egg (the :443 block won't load until the cert exists) is
# handled by scripts/init-letsencrypt.sh, which seeds a dummy cert so nginx can
# boot, then issues the real one and reloads.
#
# FIRST-ISSUE on a live box (run once, after DNS → server IP is live and
# ports 80/443 are open):
#   1. Edit domains + email (and staging=0 for real certs) in
#        scripts/init-letsencrypt.sh
#   2. ./scripts/init-letsencrypt.sh        # dummy → nginx up → real cert → reload
#   3. docker compose up -d                 # bring up the whole stack
#   4. Point the Meta webhook callback at:
#        https://giinventory.com/api/whatsapp/webhook
#
# Thereafter: ordinary `docker compose up -d`; the certbot service auto-renews
# and nginx reloads the renewed cert on its own.
# ============================================================================

# ============================================================================
# gihub.conf — nginx reverse proxy for the GI Hub stack
# nginx is the ONLY service bound to host ports. Streamlit, FastAPI and Ollama
# stay on the internal gi-net bridge with no host ports.
#
# v1 = HTTP on :80 (good for the local smoke test + before the domain exists).
# TLS (:443 via Let's Encrypt/certbot) is added in the Nginx+TLS step once the
# CCX33 is live and the domain's A-record points at it.
# ============================================================================

upstream streamlit_upstream { server streamlit:8501; }
upstream fastapi_upstream   { server fastapi:8000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;          # photo / MTC / attachment uploads

    # ---- FastAPI sidecar: RAG/manual assistant (+ future WhatsApp webhook) ----
    location /api/ {
        proxy_pass         http://fastapi_upstream/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;       # LLM streaming responses
    }

    # ---- Material photos served straight off the gi-data volume (later) ----
    # Uncomment once the material-photo feature writes to /app/data/material_photos.
    # location /photos/ {
    #     alias /srv/data/material_photos/;
    #     expires 7d;
    #     access_log off;
    # }

    # ---- Streamlit ERP app (root). Needs WebSocket upgrade for the live UI. ----
    location / {
        proxy_pass         http://streamlit_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;     # keep the Streamlit WebSocket alive
    }
}

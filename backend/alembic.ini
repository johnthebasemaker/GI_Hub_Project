# ============================================================================
# backend/alembic.ini — Alembic config for the new-stack Postgres.
# The DB URL is NOT set here; env.py reads it from $DATABASE_URL (normalised to
# psycopg2, since Alembic runs synchronously). Run from the repo root, e.g.:
#   DATABASE_URL=postgresql+psycopg2://postgres@127.0.0.1:5433/gihub \
#     alembic -c backend/alembic.ini upgrade head
# ============================================================================
[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/..
path_separator = os
# Keep autogenerated file names sortable + descriptive.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# ============================================================================
# deploy/nginx.conf — reverse proxy for the new-stack (React SPA + FastAPI).
#
# Rendered by nginx:alpine's envsubst on boot: only ${DOMAIN} is substituted
# (from the env); nginx runtime vars like $uri / $host are left untouched.
#
#   :80   ACME HTTP-01 challenge + redirect everything else to HTTPS
#   :443  TLS; serves the React build; proxies /api/ → the `api` service
#
# The /api/ proxy has a TRAILING SLASH on proxy_pass, so it strips the /api
# prefix: /api/auth/login → http://api:8000/auth/login (backend routes are at
# /auth, /inventory, … — matches the frontend's axios baseURL '/api' + the Vite
# dev proxy rewrite, so the same relative paths work in dev and prod).
# ============================================================================

# ---- HTTP: cert challenge + redirect ---------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: the app --------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 25m;   # report downloads / uploads headroom

    # --- API → FastAPI (internal service `api`, no host port) ---------------
    location /api/ {
        proxy_pass http://api:8000/;      # trailing slash strips the /api prefix
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;          # PDF/Excel report generation headroom
    }

    # --- React SPA: hashed assets cache-forever, index.html no-cache --------
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;   # client-side routing fallback
    }
}

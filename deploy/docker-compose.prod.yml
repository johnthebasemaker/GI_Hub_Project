# ============================================================================
# deploy/docker-compose.prod.yml — NEW-STACK production (React + FastAPI + PG).
#
# This is the React/FastAPI/Postgres stack (the one made feature-complete in the
# 2026-07 build), NOT the Streamlit app at the repo-root docker-compose.yml.
# Run it from THIS directory:  docker compose -f docker-compose.prod.yml ...
# Build context is the repo root (`context: ..`).
#
# Services (only `web` binds host ports):
#   db      postgres:16   internal          system of record
#   api     FastAPI        internal :8000   async → Postgres
#   web     nginx          :80 + :443       SPA + /api proxy + TLS
#   certbot certbot        no ports          cert issuance + auto-renew
#   ollama  ollama         internal :11434  local LLM (Intelligence layer)
#
# Secrets come from deploy/.env (copy .env.example → .env and fill it in).
# ============================================================================

name: gi-hub-newstack

networks:
  gi-new:
    driver: bridge

volumes:
  pg-data-prod:     # PostgreSQL data — the system of record. Backed up by `backup`.
  pg-backups:       # pg_dump output (nightly `backup` + console /admin/backup).
                    # OFF-BOX before go-live: bind this to a Hetzner Storage Box
                    # (same pattern the v1 root compose notes for gi-backups),
                    # e.g.
                    #   pg-backups:
                    #     driver_opts:
                    #       type: cifs
                    #       o: "username=…,password=…,uid=10001,vers=3.0"
                    #       device: "//<box>.your-storagebox.de/backup"
  certbot-etc:      # /etc/letsencrypt (certs + account)
  certbot-www:      # ACME HTTP-01 webroot
  ollama-models:    # pulled model weights (llama3.1:8b ≈ 5 GB, qwen2.5vl:7b ≈ 5 GB)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data-prod:/var/lib/postgresql/data
    networks: [gi-new]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GI_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      # asyncpg URL (config.async_database_url normalises psycopg2/plain forms too).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Single-origin behind nginx → CORS unused; set only if you split origins.
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Intelligence layer (Phase AI-*): local Ollama service. Leave as-is;
      # the AI endpoints degrade to a friendly notice when it's unreachable.
      OLLAMA_HOST: http://ollama:11434
      GI_AI_CONCURRENCY: ${GI_AI_CONCURRENCY:-2}
      # Console /admin/backup (manual pg_dump) writes here; shared with the
      # `backup` service's pg-backups volume so manual + nightly dumps unify.
      GI_BACKUPS_DIR: /backups
    volumes:
      - pg-backups:/backups
    networks: [gi-new]
    # No host ports — reached only via nginx (`web`) at /api/.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    depends_on: [api]
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks: [gi-new]

  # Local LLM host for the Intelligence layer (Hub Assistant now; OCR/NL-SQL in
  # later AI phases). CPU inference; NO host ports — internal-only like db/api.
  # RULING 2026-07-06: same box as the stack, ONE warm model at a time —
  # Ollama load-on-demand swaps models (~30-60s penalty) and keep_alive holds
  # the last-used one. Pull models ONCE after first up (they persist in the
  # ollama-models volume):
  #   docker compose -f docker-compose.prod.yml exec ollama ollama pull llama3.1:8b
  #   docker compose -f docker-compose.prod.yml exec ollama ollama pull qwen2.5vl:7b   # Phase AI-3 OCR
  # RAM note (CPX42 16 GB): a 7-8B model uses ~6-8 GB while loaded;
  # OLLAMA_MAX_LOADED_MODELS=1 keeps the budget safe alongside Postgres + the
  # API. If AI latency ever hurts, move this service to a dedicated host and
  # point the api's OLLAMA_HOST env at it.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: 30m
    volumes:
      - ollama-models:/root/.ollama
    networks: [gi-new]

  # Cert issuance is bootstrapped by deploy/init-letsencrypt.sh; this service
  # just renews every 12h and lets nginx pick it up on its own reload cycle.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

  # Nightly pg_dump of pg-data-prod — the ONLY automated backup of the Postgres
  # system of record (the v1 SQLite `backup` service cannot cover Postgres).
  # Custom-format dumps + 14-day retention + .last_success/.last_failure markers,
  # mirroring the v1 backup so the Admin "Service Health" card reads them
  # unchanged. Uses postgres:16-alpine so pg_dump matches the `db` server version
  # (and the image is already pulled). NO host ports — internal-only.
  # Restore:  docker compose -f docker-compose.prod.yml exec -T db \
  #             pg_restore -U $POSTGRES_USER -d $POSTGRES_DB -c < gihub-<stamp>.dump
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: db
      GI_BACKUP_DIR: /backups
      TZ: Asia/Riyadh
    volumes:
      - pg-backups:/backups
      - ./backup/backup-pg.sh:/usr/local/bin/backup-pg.sh:ro
    networks: [gi-new]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache tzdata >/dev/null
        # Invoke via `sh` so we don't rely on the mounted file's +x bit.
        echo '0 2 * * * /bin/sh /usr/local/bin/backup-pg.sh >> /backups/backup.log 2>&1' > /etc/crontabs/root
        echo "[pg-backup] cron installed — nightly 02:00 Asia/Riyadh. Running an initial pass…"
        /bin/sh /usr/local/bin/backup-pg.sh || true
        exec crond -f -l 8

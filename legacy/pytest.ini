[pytest]
# Discover tests in the tests/ subdirectory
testpaths = tests

# Add the project root to sys.path so `import database` works from any test
pythonpath = .

# Output style
addopts =
    -v
    --tb=short
    --no-header
    -q

# Show test durations — useful for spotting slow DB operations
# (requires pytest >= 6.0)
# addopts = -v --durations=10

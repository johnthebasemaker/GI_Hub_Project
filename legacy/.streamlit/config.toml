[theme]
# General Industries Corporate Theme — Deep Blue & Gold
base                     = "dark"
primaryColor             = "#FBBF24"   # Lightning Gold (buttons, highlights, accents)
backgroundColor          = "#0A1628"   # Deep navy background
secondaryBackgroundColor = "#162038"   # Card / sidebar surface
textColor                = "#F0F4F8"   # Primary text
font                     = "sans serif"

[browser]
gatherUsageStats = false

[client]
# Never dump raw tracebacks + source onto the frontend. The global error
# boundary in main.py shows a friendly one-liner + reference ID and logs the
# full traceback to logs/app_errors.log. Set GI_DEBUG=1 for inline details.
showErrorDetails = "none"

[server]
headless      = true
maxUploadSize = 50

[runner]
fastReruns = true

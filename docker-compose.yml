# ============================================================================
# docker-compose.yml — GI Hub production stack (Hetzner CCX33 / Linux)
# ----------------------------------------------------------------------------
# Five services on ONE private bridge (gi-net). Only nginx touches host ports.
# Ollama + FastAPI have NO host ports — that is the load-bearing "AI stays safe
# internal" guarantee, preserved even though the box is now public-facing.
#
#   nginx     :80 (→ :443 in the TLS step)  reverse proxy / sole ingress
#   streamlit  internal :8501               the ERP app
#   fastapi    internal :8000               RAG / manual assistant sidecar
#   ollama     internal :11434  NO PORTS     local LLMs
#   backup     no ports                      nightly SQLite + uploads backup
#
# This file is for the SERVER ONLY. The Mac dev path stays `streamlit run main.py`.
# ============================================================================

name: gi-hub

networks:
  gi-net:
    driver: bridge

volumes:
  gi-data:        # SQLite DB + uploads + entry attachments + material_photos
  gi-ollama:      # Ollama model cache (qwen2.5-coder:7b, llama3.1:8b, …)
  gi-models:      # reserved: CV weights for when the LocateAnything gate is ON
  certbot-etc:    # Let's Encrypt certs + account state (/etc/letsencrypt)
  certbot-www:    # ACME HTTP-01 challenge webroot (/var/www/certbot)
  gi-backups:     # backup destination — see note below
  # ⚠️ OFFSITE GAP: with Hetzner snapshots disabled, this named volume is our
  # ONLY backup, and it lives on the SAME VPS disk as gi-data. It protects
  # against DB corruption / bad writes / accidental deletes, but NOT against
  # total VPS loss. Before go-live, bind gi-backups to an OFF-box target
  # (Hetzner Storage Box via NFS/CIFS), e.g.:
  #   gi-backups:
  #     driver: local
  #     driver_opts:
  #       type: cifs
  #       o: "username=<box>,password=<pw>,vers=3.0,uid=0,gid=0"
  #       device: "//<box>.your-storagebox.de/backup"

services:
  # ---- Reverse proxy: the only public-facing service ----------------------
  # TLS via Let's Encrypt. First boot on a live box: run scripts/init-letsencrypt.sh
  # ONCE (it seeds a dummy cert so nginx can start, then swaps in the real cert).
  # After that, `docker compose up -d` just works; the certbot service auto-renews
  # and the reload loop below makes nginx pick up the renewed cert every 6h.
  # For a local / no-TLS run, point the config mount at gihub.conf instead.
  nginx:
    image: nginx:1.27-alpine
    depends_on: [streamlit, fastapi]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/gihub.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro     # certs (read-only for nginx)
      - certbot-www:/var/www/certbot         # ACME challenge files
      - gi-data:/srv/data:ro                 # lets nginx serve /photos/ directly later
    networks: [gi-net]
    restart: unless-stopped
    # Reload every 6h so a freshly-renewed certificate is picked up without a
    # manual restart; nginx itself runs in the foreground (daemon off).
    command: >
      /bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'

  # ---- Certbot: obtains + auto-renews the Let's Encrypt certificate --------
  # No host ports. Shares the two volumes with nginx. The renew loop is a no-op
  # until ~30 days before expiry, then renews and the nginx reload loop applies it.
  certbot:
    image: certbot/certbot:latest
    depends_on: [nginx]
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks: [gi-net]
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

  # ---- ERP app (Streamlit) ------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    image: gihub-streamlit:latest
    depends_on: [ollama]
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GI_SUPPRESS_EMBEDDED_WORKER=1   # no in-container worker (added in WhatsApp step)
      - GI_DATA_DIR=/app/data
      - TZ=Asia/Riyadh
      # - WHATSAPP_PROVIDER=meta        # uncommented in the WhatsApp step
    volumes:
      - gi-data:/app/data
    networks: [gi-net]
    restart: unless-stopped
    # no host ports — nginx is the only ingress

  # ---- RAG / manual assistant sidecar -------------------------------------
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    image: gihub-fastapi:latest
    depends_on: [ollama]
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - TZ=Asia/Riyadh
      # Meta WhatsApp webhook (receiver stubs live in services/rag_api.py).
      # Provide these via the server's .env / Docker secrets — never hardcode.
      # - META_WEBHOOK_VERIFY_TOKEN=${META_WEBHOOK_VERIFY_TOKEN}
      # - META_APP_SECRET=${META_APP_SECRET}
    networks: [gi-net]
    restart: unless-stopped
    # no host ports — reached via nginx /api/

  # ---- WhatsApp worker: drains the queue via the Meta Cloud API -----------
  # Reuses the app image but runs whatsapp_worker.py instead of Streamlit. The
  # Streamlit container suppresses its embedded worker (GI_SUPPRESS_EMBEDDED_WORKER=1),
  # so this is the single sender process. Shares gi-data to read the queue.
  worker:
    image: gihub-streamlit:latest
    depends_on: [streamlit]
    command: ["python", "whatsapp_worker.py"]
    environment:
      - WHATSAPP_PROVIDER=meta
      - GI_DATA_DIR=/app/data
      - TZ=Asia/Riyadh
      # Provide via the server's .env / Docker secrets — never hardcode:
      # - META_PHONE_NUMBER_ID=${META_PHONE_NUMBER_ID}
      # - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
    volumes:
      - gi-data:/app/data
    networks: [gi-net]
    restart: unless-stopped
    # no host ports

  # ---- Local LLM runtime: INTERNAL ONLY -----------------------------------
  ollama:
    image: ollama/ollama:latest
    environment:
      # 16 GB RAM guardrails — never hold two models resident at once.
      # MAX_LOADED_MODELS=1 unloads the current model before loading the next;
      # NUM_PARALLEL=1 caps concurrent requests so a burst can't force a
      # second model into memory. Trade-off: switching coder <-> chat reloads
      # from disk (a few seconds), but peak RAM stays ~one model + the app stack.
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - gi-ollama:/root/.ollama
    networks: [gi-net]
    restart: unless-stopped
    # NO ports: block — never expose Ollama to the host/internet.
    # Pull models once after first `up`:
    #   docker compose exec ollama ollama pull qwen2.5-coder:7b
    #   docker compose exec ollama ollama pull llama3.1:8b
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ---- Nightly backup -----------------------------------------------------
  backup:
    image: alpine:3.20
    depends_on: [streamlit]
    volumes:
      - gi-data:/data                 # rw: SQLite .backup touches -wal/-shm
      - gi-backups:/backups
      - ./docker/backup/backup.sh:/usr/local/bin/backup.sh:ro
    environment:
      - GI_DATA_DIR=/data
      - GI_BACKUP_DIR=/backups
      - TZ=Asia/Riyadh
    networks: [gi-net]
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache sqlite rsync tzdata >/dev/null
        echo '0 2 * * * /usr/local/bin/backup.sh >> /backups/backup.log 2>&1' > /etc/crontabs/root
        echo "[backup] cron installed — nightly 02:00 local. Running an initial pass…"
        /usr/local/bin/backup.sh || true
        exec crond -f -l 8

# ============================================================================
# postgres-dual-ci.yml — Phase 4 dual-backend CI (data layer)
# ----------------------------------------------------------------------------
# Runs on GitHub's runners (no local Docker needed on anyone's machine):
#   1. The full SQLite regression suite (bug_check.py) — the existing safety net.
#   2. backend/dual_ci.py against a real PostgreSQL 16 service — migrates the
#      committed gi_database.db into Postgres via backend/models.py and asserts
#      cross-backend parity (tables, views, identity-math aggregates).
#
# SCOPE: this validates the DATA LAYER on Postgres (schema, types, data copy,
# view dialect). It does NOT yet run the app itself on Postgres — get_connection()
# is still SQLite-only; that behavioural dual-CI arrives once the engine seam is
# wired into get_connection() in a later phase.
# ============================================================================
name: Postgres dual-CI

on:
  push:
    branches: [main]
    paths:
      - 'legacy/**'
      - 'backend/**'
      - 'frontend/**'
      - 'tools/**'
      - 'requirements.txt'
      - '.github/workflows/postgres-dual-ci.yml'
      - 'gi_database.db'
  pull_request:
    paths:
      - 'legacy/**'
      - 'backend/**'
      - 'frontend/**'
      - 'tools/**'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  dual-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gihub
          POSTGRES_PASSWORD: gihub_ci
          POSTGRES_DB: gihub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gihub -d gihub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: System deps (libzbar for pyzbar QR checks)
        run: sudo apt-get update && sudo apt-get install -y libzbar0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      # Phase B layout: the legacy app lives in legacy/ (bug_check is
      # self-rooted — it resolves every path from its own directory).
      - name: SQLite regression suite (legacy/bug_check.py)
        run: python legacy/bug_check.py   # SQLite only (no DATABASE_URL here)

      # Data-layer migration to Postgres (tables + row parity + facade smoke).
      # Views + full Streamlit-on-PG behaviour are intentionally out of scope —
      # PG is the FastAPI foundation; Streamlit stays on SQLite. (pg_smoke.py is
      # retained but not run in CI; see docs/POSTGRES_MIGRATION.md.)
      - name: Dual-CI — data-layer migrate + parity (SQLite → PostgreSQL)
        env:
          DATABASE_URL: postgresql+psycopg2://gihub:gihub_ci@localhost:5432/gihub
        run: python tools/dual_ci.py --source gi_database.db

      # Accuracy guard for the FastAPI backend's derived-stock SQL: assert each
      # ported Postgres query matches its SQLite reporting view row-for-row on the
      # real data. Runs after dual_ci has populated Postgres from gi_database.db.
      - name: Derived-view parity (SQLite views vs ported PG SQL)
        env:
          DATABASE_URL: postgresql+psycopg2://gihub:gihub_ci@localhost:5432/gihub
        run: python tools/parity_check.py --source gi_database.db

      # Service-level invariants (rolled back — no persistence) + auth/role guards
      # driven through the real ASGI app. Runs after dual_ci has populated Postgres.
      - name: Service + guard tests (rolled-back services, HTTP auth/role gates)
        env:
          DATABASE_URL: postgresql+psycopg2://gihub:gihub_ci@localhost:5432/gihub
          JWT_SECRET: ci-only-service-test-secret-key-32bytes-min
        run: python -m backend.api.service_tests

  # Frontend typecheck + production build — catches TS/build regressions in the
  # React SPA (no DB needed). Runs in parallel with the dual-ci job.
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --prefix frontend
      - name: Typecheck + build (tsc -b && vite build)
        run: npm run build --prefix frontend

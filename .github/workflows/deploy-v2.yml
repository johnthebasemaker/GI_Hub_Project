# ============================================================================
# deploy-v2.yml — MANUAL deploy of the v2 (React/FastAPI/Postgres) stack to
# Hetzner. This is SEPARATE from deploy.yml (the v1 Streamlit pipeline), which
# is left completely untouched.
#
# SAFETY:
#   * workflow_dispatch ONLY — there is NO push trigger. It can never auto-fire;
#     cutover is a one-time event on the operator's explicit click (PROJECT_STATUS §4).
#   * Its own concurrency group (hetzner-v2) — cannot collide with or cancel the
#     v1 deploy (hetzner-production).
#   * gate → smoke-build → deploy: nothing ships to the server unless the CI
#     tests pass AND the production images build cleanly.
#
# Reuses the existing server secrets HETZNER_HOST / HETZNER_USER /
# HETZNER_SSH_KEY / HETZNER_SSH_PORT / HETZNER_APP_DIR, plus SLACK_WEBHOOK_URL.
# ============================================================================
name: Deploy v2 to Hetzner (manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm you intend to (re)deploy v2 and hand over :80/:443 from v1.'
        required: true
        default: ''

concurrency:
  group: hetzner-v2
  cancel-in-progress: false

jobs:
  # ---- Gate: the v2 test matrix (mirrors postgres-dual-ci.yml's data setup) --
  gate:
    name: CI gate (tests + build + advisory format)
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gihub
          POSTGRES_PASSWORD: gihub_ci
          POSTGRES_DB: gihub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gihub -d gihub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: System deps (libzbar for pyzbar QR checks)
        run: sudo apt-get update && sudo apt-get install -y libzbar0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: Populate Postgres (dual_ci — same as the shared CI)
        env:
          DATABASE_URL: postgresql+psycopg2://gihub:gihub_ci@localhost:5432/gihub
        run: python backend/dual_ci.py --source gi_database.db

      - name: Derived-view parity (SQLite views vs ported PG SQL)
        env:
          DATABASE_URL: postgresql+psycopg2://gihub:gihub_ci@localhost:5432/gihub
        run: python backend/api/parity_check.py --source gi_database.db

      - name: Service + guard tests
        env:
          DATABASE_URL: postgresql+psycopg2://gihub:gihub_ci@localhost:5432/gihub
          JWT_SECRET: ci-only-service-test-secret-key-32bytes-min
        run: python -m backend.api.service_tests

      - name: Frontend typecheck + production build
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      # ADVISORY ONLY — never blocks a deploy. Reports formatting drift without
      # forcing a repo-wide Black sweep (that would violate the code freeze).
      - name: Black (advisory, non-blocking)
        continue-on-error: true
        run: |
          pip install black
          black --check --diff backend || echo "::warning::Black would reformat files (advisory — not a gate)"

  # ---- Smoke-build the production images (catches Dockerfile breakage) -------
  smoke-build:
    name: Docker smoke-build (api + web)
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production images (no push — build-only smoke test)
        run: |
          docker compose -f deploy/docker-compose.prod.yml build api web

  # ---- Deploy: SSH to the server and run the server-side orchestrator --------
  deploy:
    name: SSH deploy (v2)
    needs: [gate, smoke-build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (deploy-v2.sh)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          port:     ${{ secrets.HETZNER_SSH_PORT }}
          # Forward the Slack webhook to the server-side script.
          envs: SLACK_WEBHOOK_URL
          script_stop: true
          command_timeout: 30m     # image builds + migrations on a shared-vCPU box
          script: |
            set -euo pipefail
            cd "${{ secrets.HETZNER_APP_DIR }}"
            git fetch --prune origin
            git reset --hard origin/main
            bash deploy/deploy-v2.sh
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
